# 生产环境：仅本机监听，由宿主机 Nginx 对外暴露
services:
  mysql:
    # backend 通过 Docker 网络 mysql:3306 访问，不占用宿主机 3306
    ports: !override []

  backend:
    shm_size: "256mb"
    ports: !override
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
      - "127.0.0.1:${VNC_PORT:-6080}:6080"
    environment:
      XVFB_SCREEN: 1440x900x24
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      UVICORN_RELOAD: "0"

  frontend_prod:
    ports: !override
      - "127.0.0.1:${FRONTEND_PROD_PORT:-5174}:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
