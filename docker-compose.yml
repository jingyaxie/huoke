services:
  mysql:
    image: mysql:8.0
    container_name: douyin_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: douyin_hot
      MYSQL_USER: douyin
      MYSQL_PASSWORD: douyin
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:${MYSQL_PORT:-3306}:3306"
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - ./mysql/data:/var/lib/mysql
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  backend_base:
    profiles: ["build"]
    build:
      context: ./backend
      target: backend-base
    image: douyin-backend-base:py312

  backend:
    build:
      context: ./backend
      target: backend-app
    image: douyin-backend-app:latest
    container_name: douyin_backend
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      MYSQL_USER: douyin
      MYSQL_PASSWORD: douyin
      MYSQL_DATABASE: douyin_hot
      DISPLAY: :99
      UVICORN_RELOAD: "1"
      STORAGE_ROOT: /data/huoke-storage
    depends_on:
      - mysql
    ports:
      - "${BACKEND_PORT:-8000}:8000"
      - "${VNC_PORT:-6080}:6080"
    volumes:
      - ./backend:/app
      - ./storage:/data/huoke-storage
      - ./reports:/app/reports
    command: ["sh", "/app/scripts/docker-entrypoint.sh"]

  frontend:
    image: node:20-alpine
    container_name: douyin_frontend
    restart: unless-stopped
    depends_on:
      - backend
    working_dir: /app
    environment:
      VITE_API_BASE_URL: /api
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: ["sh", "-lc", "npm install && npm run dev -- --host 0.0.0.0 --port 5173"]
    ports:
      - "${FRONTEND_PORT:-5173}:5173"

  frontend_prod:
    profiles: ["prod"]
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    image: huoke-frontend-prod:latest
    container_name: douyin_frontend_prod
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PROD_PORT:-5174}:80"

volumes:
  frontend_node_modules:
