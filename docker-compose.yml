services:
  mysql:
    image: mysql:8.0
    container_name: douyin_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: douyin_hot
      MYSQL_USER: douyin
      MYSQL_PASSWORD: douyin
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - ./mysql/data:/var/lib/mysql
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  backend:
    build:
      context: ./backend
    container_name: douyin_backend
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      MYSQL_USER: douyin
      MYSQL_PASSWORD: douyin
      MYSQL_DATABASE: douyin_hot
      DISPLAY: :99
    depends_on:
      - mysql
    ports:
      - "8000:8000"
      - "6080:6080"
    volumes:
      - ./backend:/app
      - ./storage:/app/storage
      - ./reports:/app/reports
    command:
      - sh
      - -c
      - |
        Xvfb :99 -screen 0 1440x900x24 -ac +extension GLX +render -noreset &
        fluxbox -display :99 >/tmp/fluxbox.log 2>&1 &
        x11vnc -display :99 -nopw -forever -shared -listen 0.0.0.0 -xkb -rfbport 5900 &
        websockify --web=/usr/share/novnc/ 6080 localhost:5900 &
        python - <<'PY'
        import os
        import time
        import pymysql
        host = 'mysql'
        port = 3306
        user = os.getenv('MYSQL_USER', 'douyin')
        pwd = os.getenv('MYSQL_PASSWORD', 'douyin')
        db = os.getenv('MYSQL_DATABASE', 'douyin_hot')
        ok = False
        for _ in range(60):
            try:
                conn = pymysql.connect(host=host, port=port, user=user, password=pwd, database=db)
                conn.close()
                ok = True
                break
            except Exception:
                time.sleep(2)
        raise SystemExit(0 if ok else 1)
        PY
        alembic upgrade head
        uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
    container_name: douyin_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"
